services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: gravity
      POSTGRES_PASSWORD: gravity_dev
      POSTGRES_DB: gravity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gravity"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse:26.3
    environment:
      CLICKHOUSE_DB: gravity_analytics
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "-qO-", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.11-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  gravity-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      GRAVITY__DATABASE__HOST: postgres
      GRAVITY__DATABASE__USER: gravity
      GRAVITY__DATABASE__PASS: gravity_dev
      GRAVITY__DATABASE__DB_NAME: gravity
      GRAVITY__REDIS__HOST: redis
      GRAVITY__REDIS__PORT: 6379
      GRAVITY__CLICKHOUSE__HOST: clickhouse
      GRAVITY__CLICKHOUSE__PORT: 9000
      GRAVITY__CLICKHOUSE__DATABASE: gravity_analytics
      GRAVITY__NATS__HOST: nats
      GRAVITY__NATS__PORT: 4222
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      nats:
        condition: service_healthy

  gravity-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - gravity-server

volumes:
  postgres_data:
  clickhouse_data:
